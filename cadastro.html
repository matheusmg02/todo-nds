<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <img src="assets/Brand.png" alt="">
    <a href="login.html">Não possui uma conta?</a>
  </header>
  <main>
    <form id="form-cadastro" class="form-container">
      <img class="logo-mobile" src="assets/Brand.png" alt="">
      <h2>Nova Conta</h2>

      <label for="nome">Nome</label>
      <input type="nome" name="nome" id="nome">

      <label for="email">Email</label>
      <input type="email" name="email" id="email">

      <label for="senha">Senha</label>
      <input type="password" name="senha" id="senha">

      <label for="confirm-senha">Confirmação de senha</label>
      <input type="password" name="confirmSenha" id="confirmSenha">

      <button>Cadastrar</button>

      <a class="link-mobile" href="login.html">Já possui uma conta?</a>
    </form>
    <script src="js/cadastrarUsuario.js"></script>
  </main>
</body>
</html>
